<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NerveOS — Cyberdeck Interface</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- DESKTOP -->
<div id="desktop">

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-left">
      <span class="logo">⬡ NerveOS</span>
    </div>
    <div id="taskbar-center">
      <button class="task-btn">Terminal</button>
      <button class="task-btn">HW Monitor</button>
      <button class="task-btn">Notes</button>
      <button class="task-btn">About</button>
    </div>
    <div id="taskbar-right">
      <span id="clock"></span>
    </div>
  </div>

</div>

<script src="os.js"></script>
</body>
</html>
